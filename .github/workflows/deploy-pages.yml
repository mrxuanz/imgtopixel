name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Compute base path
        id: base
        shell: bash
        run: |
          # 检查是否配置了自定义域名文件 CNAME
          if [ -f CNAME ]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            if [[ "$REPO_NAME" == *.github.io ]]; then
              echo "base=/" >> "$GITHUB_OUTPUT"
            else
              echo "base=/$REPO_NAME/" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Build site
        env:
          BASE_PATH: ${{ steps.base.outputs.base }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
